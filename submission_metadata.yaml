# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) for architecture design, scoring-logic design, and
  implementation of the ranking pipeline (feature extraction, TF-IDF semantic
  similarity, honeypot detection, hybrid scoring, and explanation generation).
  No candidate data was sent to any hosted LLM or external API at any point;
  the ranking pipeline itself makes zero network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker combining: (1) local TF-IDF cosine similarity between each
  candidate's profile text and a JD text derived from a structured role
  profile (15% weight, deliberately modest to resist keyword-stuffed
  profiles); (2) skill-category alignment against the JD's required
  (embeddings/retrieval, vector DB/hybrid search, Python, eval frameworks)
  and preferred (LLM fine-tuning, learning-to-rank, distributed systems,
  HR-tech, open source) categories, weighted by skill_assessment_scores
  (25%); (3) experience-band fit plus the fraction of career history in
  applied-ML/AI roles (25%); (4) a domain-fit screen implementing the JD's
  explicit disqualifiers -- pure research, IT-services-only, framework-
  tutorial-only, CV/speech/robotics-only, title-chasing, architecture-only
  roles (20%); and (5) a behavioral-availability score from the 23
  redrob_signals fields -- open-to-work, notice period, recency, recruiter
  response/interview/offer rates, location/relocation fit (15%). Honeypot
  candidates are detected via internal-consistency checks (expert-skill
  duration mismatches, experience arithmetic, education date impossibilities,
  overlapping roles) and have their score multiplied by 0.05. Per-candidate
  reasoning is generated from each candidate's own feature values using
  hash-selected sentence templates -- no LLM, fully reproducible. Runtime:
  ~60s / ~3.3GB RAM for 100K candidates on CPU.

